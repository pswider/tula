name: epic-note-eval
description: |
  Evaluation suite for the epic-note skill. Verifies that drafted portal
  messages are structured, concise, contain a single clear ask, and route
  emergencies to 911 instead of producing a message.

  Top-level graders apply to every task. Task-level graders (in each
  tasks/*.yaml) fire only for that task. Format graders (Subject/greeting/
  signoff) belong at the task level on `basic-usage` only — other tasks
  intentionally don't produce a portal message.
skill: epic-note
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill produce the correct outcome for this task?
graders:
  - type: code
    name: not_empty
    config:
      assertions:
        - "len(output.strip()) > 0"
  - type: code
    name: under_word_budget
    config:
      assertions:
        - "len(output.split()) < 400"
tasks:
  - "tasks/*.yaml"
