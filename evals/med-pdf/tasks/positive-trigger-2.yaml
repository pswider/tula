id: positive-trigger-002
name: MyChart imaging PDF (image-only)
description: |
  Paul shares a MyChart CT export and notes that copy-paste didn't work
  (the canonical signal of an image-only PDF). The skill should recognize
  the image-only nature, mention the OCR/extract path, or ask for the
  file. We test recognition + workflow vocabulary, since no fixture is
  attached.
tags:
  - positive-trigger
  - imaging
  - image-only
inputs:
  prompt: |
    Here's the CT chest report I got from MyChart. The PDF looks weird —
    when I tried to copy text it didn't work. Can you read it and tell me
    what the impression says?
expected:
  outcomes:
    - type: task_completed
graders:
  - type: text
    name: recognizes_image_only
    config:
      regex_match:
        - "(?i)(image|ocr|transcribe|extract|render|outlined|MyChart|imaging)"
