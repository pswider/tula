name: med-pdf-eval
description: |
  Evaluation suite for the med-pdf skill. Verifies the agent recognizes
  medical PDF requests, follows the extract → branch-on-hasText → parse →
  reason → persist workflow, declines non-medical PDFs, and respects PHI
  boundaries.
skill: med-pdf
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill respond correctly to triggers and anti-triggers?
graders:
  - type: code
    name: not_empty
    config:
      assertions:
        - "len(output.strip()) > 0"
tasks:
  - "tasks/*.yaml"
